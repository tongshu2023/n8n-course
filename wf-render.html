<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>工作流渲染器</title>
<style>
  :root{ --bg:#faf9f6; --line:#e8e3d9; --txt:#1c1a16; --txt2:#7c746a; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);-webkit-font-smoothing:antialiased}
  #stage{position:relative;width:980px;height:300px;
    background-image:radial-gradient(rgba(60,50,30,.07) 1px, transparent 1px);
    background-size:22px 22px;background-position:center;overflow:hidden}
  .wf{position:absolute;inset:0}
  .node{position:absolute;width:176px;background:#fff;border:1px solid var(--line);
    border-radius:14px;box-shadow:0 1px 2px rgba(60,50,30,.04),0 8px 22px rgba(60,50,30,.07);
    overflow:hidden}
  .node .top{height:6px}
  .node .body{padding:13px 15px;display:flex;align-items:center;gap:11px}
  .node .ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-size:17px;flex-shrink:0}
  .node .meta{min-width:0}
  .node .nm{font-size:14px;font-weight:600;color:var(--txt);letter-spacing:-.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .node .ty{font-size:11px;color:var(--txt2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  svg.wires{position:absolute;inset:0;pointer-events:none;width:100%;height:100%}
  .badge{position:absolute;top:18px;left:22px;font-size:12px;color:var(--txt2);
    background:rgba(255,255,255,.85);padding:5px 12px;border-radius:99px;border:1px solid var(--line);
    font-weight:500;backdrop-filter:blur(4px)}
</style>
</head>
<body>
<div id="stage">
  <svg class="wires" id="wires"></svg>
  <div class="wf" id="wf"></div>
  <div class="badge" id="badge"></div>
</div>
<script>
const TYPE = {
  scheduleTrigger:{c:'#e2590a',e:'⏰',label:'定时触发'},
  manualTrigger:{c:'#e2590a',e:'▶',label:'手动触发'},
  chatTrigger:{c:'#e2590a',e:'💬',label:'聊天触发'},
  set:{c:'#7c746a',e:'✎',label:'整理字段'},
  httpRequest:{c:'#2a6df4',e:'🌐',label:'HTTP 请求'},
  chainLlm:{c:'#7c4dd6',e:'✨',label:'AI 撰写'},
  lmChatDeepSeek:{c:'#7c4dd6',e:'🧠',label:'DeepSeek 模型'},
  agent:{c:'#7c4dd6',e:'🤖',label:'AI Agent'},
  if:{c:'#1d8a4e',e:'�refit',label:'条件判断'},
  code:{c:'#1d8a4e',e:'{}',label:'Code'},
  convertToFile:{c:'#7c746a',e:'⇩',label:'转 CSV'},
  emailSend:{c:'#1d8a4e',e:'📧',label:'发邮件'},
  default:{c:'#7c746a',e:'◆',label:'节点'},
};
function tinfo(type){
  const key = (type||'').split('.').pop().replace(/^lmChat.*/,'lmChatDeepSeek');
  for(const k in TYPE){ if(key.toLowerCase()===k.toLowerCase()) return TYPE[k]; }
  if(/schedule/i.test(type))return TYPE.scheduleTrigger;
  if(/manual/i.test(type))return TYPE.manualTrigger;
  if(/chatTrigger/i.test(type))return TYPE.chatTrigger;
  if(/httpRequest/i.test(type))return TYPE.httpRequest;
  if(/chainLlm|lmChat|llm/i.test(type))return /lmChat|model|deepseek/i.test(type)?TYPE.lmChatDeepSeek:TYPE.chainLlm;
  if(/agent/i.test(type))return TYPE.agent;
  if(/\.set$/i.test(type)||/editFields/i.test(type))return TYPE.set;
  if(/\.if$/i.test(type))return TYPE.if;
  if(/\.code$/i.test(type))return TYPE.code;
  if(/convertToFile|spreadsheet/i.test(type))return TYPE.convertToFile;
  return TYPE.default;
}
async function render(){
  const params = new URLSearchParams(location.search);
  const file = params.get('wf');
  const data = await (await fetch('workflows/'+file)).json();
  document.getElementById('badge').textContent = data.name || file;
  const nodes = data.nodes.filter(n => !/stickyNote/i.test(n.type));
  // 归一化位置到画布
  const NW=176, NH=60, PAD=70, BADGE_TOP=58;
  let xs=nodes.map(n=>n.position[0]), ys=nodes.map(n=>n.position[1]);
  let minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
  const stageW=980, stageH=300;
  const spanX=(maxX-minX)||1, spanY=(maxY-minY);
  const multiRow = spanY>30;
  const availW=stageW-2*PAD-NW, availH=stageH-BADGE_TOP-NH-30;
  const sx = spanX>0?availW/spanX:0, sy = (multiRow&&spanY>0)?availH/spanY:0;
  const yCenter=(stageH-NH)/2;
  const pos={};
  nodes.forEach(n=>{
    const x = PAD + (n.position[0]-minX)*sx;
    const y = multiRow ? (BADGE_TOP + (n.position[1]-minY)*sy) : yCenter;
    pos[n.name]={x,y};
  });
  // 画节点
  const wf=document.getElementById('wf');
  nodes.forEach(n=>{
    const t=tinfo(n.type);
    const el=document.createElement('div');
    el.className='node';
    el.style.left=pos[n.name].x+'px';
    el.style.top=pos[n.name].y+'px';
    el.innerHTML=`<div class="top" style="background:${t.c}"></div>
      <div class="body"><div class="ic" style="background:${t.c}1a;color:${t.c}">${t.e}</div>
      <div class="meta"><div class="nm">${n.name}</div><div class="ty">${t.label}</div></div></div>`;
    wf.appendChild(el);
  });
  // 画连线
  const svg=document.getElementById('wires');
  const conns=data.connections||{};
  function wire(from,to,dashed){
    if(!pos[from]||!pos[to])return;
    const x1=pos[from].x+NW, y1=pos[from].y+NH/2;
    const x2=pos[to].x, y2=pos[to].y+NH/2;
    const dx=Math.max(40,(x2-x1)*0.5);
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`);
    p.setAttribute('fill','none');
    p.setAttribute('stroke', dashed?'#b9b0a3':'#c9a36a');
    p.setAttribute('stroke-width', dashed?'1.6':'2');
    if(dashed)p.setAttribute('stroke-dasharray','5 4');
    svg.appendChild(p);
    // 端点圆
    [[x1,y1],[x2,y2]].forEach(([cx,cy])=>{
      const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r','3');
      c.setAttribute('fill', dashed?'#b9b0a3':'#c9a36a');
      svg.appendChild(c);
    });
  }
  for(const from in conns){
    const out=conns[from];
    for(const port in out){
      const dashed = port!=='main';
      out[port].forEach(arr=>{ (arr||[]).forEach(c=>{ if(c&&c.node) wire(from,c.node,dashed); }); });
    }
  }
  document.body.dataset.ready='1';
}
render();
</script>
</body>
</html>
